# ==============================================================================
# GLOBAL CONFIGURATION BOUNDARIES
# ==============================================================================
# -- Global fields processed dynamically via `tpl $v $` inside common library blocks
global:
  # -- Set an override for the prefix of the fullname across all generated resources
  nameOverride: ""
  # -- Set the entire name definition mapping explicitly, bypassing standard chart name derivations
  fullnameOverride: ""
  # -- Set additional global labels applied to every manifest generated by this chart. Helm template syntax can be used.
  labels: {}
  # -- Set additional global annotations applied to every manifest generated by this chart. Helm template syntax can be used.
  annotations: {}

# -- Configuration structural override for local chart-level common.names blocks
nameOverride: ""
fullnameOverride: ""

# ==============================================================================
# CLUSTER-SCOPED RESOURCES (FOUNDATIONAL REVENUE CONTROL)
# ==============================================================================
# -- Collection of global, cluster-scoped Argo Rollouts analysis configurations
clusterAnalysisTemplate:
  # -- Dynamic key used as the context identifier for the ClusterAnalysisTemplate resource
  catitemname:
    # -- Enable or disable the generation of this global cluster analysis template
    enabled: false
    # -- REQUIRED BY SPEC: Core metric provider definitions used to perform cluster health validation tests
    metrics: []
    #   - name: global-ingress-error-rate
    #     interval: 1m
    #     successCondition: result[0] < 0.05
    #     provider:
    #       prometheus:
    #         address: http://prometheus.monitoring.svc.cluster.local:9090
    #         query: |
    #           sum(rate(nginx_ingress_controller_requests{status=~"5.*"}[2m])) 
    #           / 
    #           sum(rate(nginx_ingress_controller_requests[2m]))
    # -- Overrides name schema inside template block specifically for this resource boundary
    nameOverride: ""
    # -- Overrides the fully derived name completely for this individual resource instance
    fullnameOverride: ""
    # -- Resource-specific metadata annotations array
    annotations: {}
    # -- Resource-specific metadata labels array
    labels: {}
    # -- Input tracking arguments exposed to customize provider data query execution contexts
    args: []

# -- Collection of global, cluster-scoped promotion task configurations
clusterPromotionTask:
  # -- Dynamic dictionary key acting as the default contextual name identifier for the cluster promotion task
  cptname:
    # -- Enable or disable the generation of this cluster promotion task
    enabled: false
    
    # REQUIRED BY SPEC: Ordered collection sequence of structural actions to run when this task is invoked
    steps: []
    #   - uses: git-clone
    #     as: clone-source
    #     config:
    #       repoURL: "https://github.com/your-org/gitops-infra.git"
    #   - uses: git-clear
    #     as: reset-workspace

    # -- Overrides name schema inside template block specifically for this individual resource
    nameOverride: ""
    # -- Overrides the fully derived name completely for this resource instance
    fullnameOverride: ""
    # -- Resource-specific metadata annotations array
    annotations: {}
    # -- Resource-specific metadata labels array
    labels: {}
    # -- Collection of global context variables available during execution steps
    vars: []
    #   - name: defaultGitBranch
    #     value: "main"

# -- Collection of global, cluster-scoped configuration boundaries
clusterConfig: 
  # -- Dynamic dictionary key acting as the default contextual name identifier for the cluster configuration boundary
  ccname:
    # -- Enable or disable the generation of this cluster configuration resource
    enabled: false
    # -- Overrides name schema inside template block specifically for this individual resource
    nameOverride: ""
    # -- Overrides the fully derived name completely for this resource instance
    fullnameOverride: ""
    # -- Resource-specific metadata annotations array
    annotations: {}
    # -- Resource-specific metadata labels array
    labels: {}
    # -- Array of global automation promotion rules governing active stages across namespaces
    promotionPolicies: []

# ==============================================================================
# PROJECT BOUNDARY & NAMESPACE DELIVERY ECOSYSTEMS
# ==============================================================================
# -- Root core collection mapping for all project namespaces and nested pipeline ecosystems
project:
  # -- Dynamic dictionary key capturing the unique identifier of the target Kargo Project
  pname: 
    # -- Enable or disable the generation of this project scope and all nested resources within it
    enabled: true
    # -- Explicitly instructs Helm to deploy Project + ProjectConfig (set to false if project is already defined)
    create: true

    # -- Resource-specific metadata annotations array for the main Project manifest
    annotations: {}
    # -- Resource-specific metadata labels array for the main Project manifest
    labels: {}
    # -- Complete raw configuration block option mapping for custom project parameters if required by the spec
    spec: {}

    # -- Singleton configuration layer bound directly to the parent project identity.
    # @default -- shares the exact computed name identifier as the parent project manifest
    config:
      # -- Enable or disable the generation of the ProjectConfig resource mapping for this project
      enabled: true
      # -- Resource-specific metadata annotations array for the ProjectConfig resource
      annotations: {}
      # -- Resource-specific metadata labels array for the ProjectConfig resource
      labels: {}
      # -- Array of localization promotion rules governing automated staging behaviors within this namespace
      promotionPolicies: []
      #   - stage: dev
      #     autoPromotionEnabled: true

    # --------------------------------------------------------------------------
    # 1. VERIFICATION TEMPLATES (Argo Rollouts Metric Providers)
    # --------------------------------------------------------------------------
    # -- Collection mapping for namespace-scoped Argo Rollouts evaluation parameters
    analysisTemplate:
      # -- Dynamic key acting as the default name identifier for this namespace-scoped template
      atname:
        # -- Enable or disable the generation of this analysis template
        enabled: false
        # -- REQUIRED BY SPEC: Metrics collection defining providers and success thresholds for app verification
        metrics:
          - name: api-http-success-rate
            interval: 30s
            count: 4
            successCondition: result[0] >= 0.99
            provider:
              prometheus:
                address: http://prometheus-operated.monitoring:9090
                # Double curly braces match the input argument name declared inside the args block below
                query: |
                  sum(rate(http_requests_total{status!~"5.*", service="{{ "{{ args.service-name }}" }}"}[1m]))
                  /
                  sum(rate(http_requests_total{service="{{ "{{ args.service-name }}" }}"}[1m]))
        # -- Input argument parameters passed into data providers at runtime during evaluation checks
        args:
          - name: service-name
            value: "web-gateway-svc"
        # -- Overrides name schema inside template block specifically for this analysis template resource
        nameOverride: ""
        # -- Overrides the fully derived name completely for this resource instance
        fullnameOverride: ""
        # -- Resource-specific metadata annotations array for this individual resource
        annotations: {}
        # -- Resource-specific metadata labels array for this individual resource
        labels: {}

    # --------------------------------------------------------------------------
    # 2. SOURCE SUBSCRIPTIONS (Implicit Local Credential Scoping)
    # --------------------------------------------------------------------------
    # -- Collection mapping for Project Warehouses responsible for tracking upstream artifact state changes
    warehouse:
      # -- Dynamic dictionary key acting as the default contextual name identifier for this individual warehouse
      wname:
        # -- Enable or disable the generation of this individual warehouse resource
        enabled: false
        
        # REQUIRED BY SPEC: List of source tracking endpoints (images, git repositories, helm charts) to monitor for updates
        # Kargo tracks credentials seamlessly using Namespace Secrets containing the label: kargo.akuity.io/cred-type: <helm|image>
        subscriptions:
          # TYPE 1: Public HTTPS Helm Chart Repository Subscription Example
          - helm:
              repoURL: "https://charts.bitnami.com/bitnami"
              name: "redis"
              semverConstraint: "^18.0.0"
              discoveryLimit: 5
          
          # TYPE 2: Google Artifact Registry (OCI Container Image Subscription Example)
          - image:
              repoURL: "us-central1-docker.pkg.dev/my-gcp-project-id/application-registry/web-service"
              imageSelectionStrategy: SemVer
              semverConstraint: "^2.1.0"
              allowTags: "^v2\\.\\d+\\.\\d+$"
          
          # TYPE 3: GitHub Container Registry (OCI Container Image Subscription Example)
          - image:
              repoURL: "ghcr.io/your-organization-name/core-api"
              imageSelectionStrategy: Lexical
              allowTags: "^main-[a-f0-9]{7}$" # Captures semantic pattern tracking branch-commit combinations
          
          # TYPE 4: DockerHub Registry (Container Image Subscription Example)
          - image:
              repoURL: "registry.hub.docker.com/library/nginx"
              imageSelectionStrategy: SemVer
              semverConstraint: "~1.25.0"

        # -- Strategy mapping deciding how New Freight is instantiated inside the engine ('Automatic' or 'Manual')
        freightCreationPolicy: "Automatic"
        # -- Polling interval syntax instructing the controller how often to verify source subscription states
        interval: "5m0s"
        # -- Shard label parameter configuring target execution groups for isolated controller clustering
        shard: ""
        # -- List of explicit validation criteria requirements that must match before creating new Freight records
        freightCreationCriteria: []

    # --------------------------------------------------------------------------
    # 3. PIPELINE STAGES (Deployment target boundaries and guardrails)
    # --------------------------------------------------------------------------
    # -- Collection mapping for Project Stages representing unique deployment environments inside the pipeline
    stage:
      # -- Dynamic dictionary key acting as the default contextual name identifier for this individual stage (e.g., dev, staging)
      sname:
        # -- Enable or disable the generation of this individual pipeline stage resource
        enabled: false
        
        # REQUIRED BY SPEC (Either requestedFreight OR freightRequest must be populated to satisfy validation checks)
        requestedFreight: []
        #   - origin:
        #       kind: Warehouse
        #       name: warehouseItemName
        #     sources:
        #       direct: true
        
        # REQUIRED BY SPEC (Alternative explicit constraint mapping block if requestedFreight is omitted)
        freightRequest: {}
        #   alias: "production-ready-freight"
        #   origin:
        #     kind: Warehouse
        #     name: warehouseItemName

        # -- Overrides name schema inside template block specifically for this individual stage resource
        nameOverride: ""
        # -- Overrides the fully derived name completely for this individual stage resource instance
        fullnameOverride: ""
        # -- Resource-specific metadata annotations array for this individual stage
        annotations: {}
        # -- Resource-specific metadata labels array for this individual stage
        labels: {}
        # -- Shard label parameter configuring target execution groups for isolated controller clustering
        shard: ""
        # -- Parameter block specifying automated validation parameters, test automation tasks, or health evaluation templates
        verification: {}
        # -- Configuration containing execution contexts and sequences triggered during promotion phases
        promotionTemplate:
          # UTILITY / APPLICATION STEP EXAMPLES: Commented out to provide quick blueprints for platform engineers
          steps:
            # Example A: Standard Kustomize Image Update Task
            - uses: git-clone
              config:
                repoURL: "https://github.com/your-org/gitops-infra.git"
            - uses: kustomize-set-image
              config:
                image: "ghcr.io/your-org/core-api"
                path: "environments/stages/dev"
            - uses: git-commit
              config:
                message: "chore(kargo): auto-promoted image to development environment"
                
            # Example B: Classic Helm Remote Repository Chart Ingestion Task
            # - uses: git-clone
            #   config:
            #     repoURL: "https://github.com/your-org/gitops-infra.git"
            # - uses: helm-update-chart
            #   config:
            #     chartPath: "environments/stages/production/charts/application-umbrella"
            #     chartName: "redis"
            # - uses: git-commit
            #   config:
            #     message: "chore(kargo): advanced helm chart tracking version boundaries"

    # --------------------------------------------------------------------------
    # 4. RUNTIME AUTOMATION TASKS (Reusable operational building blocks)
    # --------------------------------------------------------------------------
    # -- Collection mapping for Project-scoped Promotion Tasks executing shared automation logic inside this project boundary
    promotionTask:
      # -- Dynamic dictionary key acting as the default contextual name identifier for this namespace task
      ptname:
        # -- Enable or disable the generation of this project-scoped promotion task resource
        enabled: false
        
        # REQUIRED BY SPEC: Ordered collection sequence of structural actions to run when this task is invoked by a Stage
        steps: []
        #   - uses: git-clone
        #     config:
        #       repoURL: "https://github.com/your-org/gitops-infra.git"
        #   - uses: argocd-update
        #     config:
        #       apps:
        #         - name: "frontend-ux-service"

        # -- Overrides name schema inside template block specifically for this individual task resource
        nameOverride: ""
        # -- Overrides the fully derived name completely for this individual task resource instance
        fullnameOverride: ""
        # -- Resource-specific metadata annotations array for this task
        annotations: {}
        # -- Resource-specific metadata labels array for this task
        labels: {}
        # -- Collection of execution parameters variable states declared locally inside the task ecosystem
        vars: []
          # - name: defaultGitBranch
          #   value: "main"
