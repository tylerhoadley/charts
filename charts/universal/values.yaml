global:
  nameOverride: test
  fullnameOverride: test


image:
  repository: registry.computersthatwork.ca:5005/iac/images/stunnel
  tag: '2022-09-09-16-24'
  pullPolicy: Always

imagePullSecrets:
- name: gitlab-registry

env:
  TZ: 'America/Toronto'

securityContext:
  allowPrivilegeEscalation: true
  capabilities:
    add:
    - NET_ADMIN
    - NET_BIND_SERVICE
    - SYS_ADMIN
  privileged: true
  readOnlyRootFilesystem: false
  runAsNonRoot: false

probes:
  liveness:
    enabled: true
    custom: true
    spec:
      failureThreshold: 3
      initialDelaySeconds: 10
      periodSeconds: 2
      #successThreshold: 1
      tcpSocket:
        port: stunnel-tcp
      timeoutSeconds: 2
  readiness:
    enabled: true
    custom: true      
    spec:
      failureThreshold: 3
      initialDelaySeconds: 10
      periodSeconds: 2
      #successThreshold: 2
      tcpSocket:
        port: stunnel-tcp
      timeoutSeconds: 2
  startup:
    enabled: true
    custom: true      
    spec:
      failureThreshold: 3
      initialDelaySeconds: 10
      periodSeconds: 2
      #successThreshold: 2
      tcpSocket:
        port: stunnel-tcp
      timeoutSeconds: 2

service:
  main:
    enabled: true
    ports:
      http:
        enabled: false
      stunnel-tcp:
        enabled: true
        port: 636
        targetPort: 636
        protocol: TCP

    type: LoadBalancer
    externalTrafficPolicy: Cluster
    loadBalancerIP: 192.168.2.211
    annotations:
      metallb.universe.tf/address-pool: default



ingress:
  # -- Enable and configure ingress settings for the chart under this key.
  # @default -- See values.yaml
  main:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: le-global-issuer
      nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.0.0/16"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      cf.containeroo.ch/content: computersthatwork.ca.
      cf.containeroo.ch/type: CNAME
      cf.containeroo.ch/proxied: "false"
      cf.containeroo.ch/ttl: "300"
      cf.containeroo.ch/interval: 5m 
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.ingress.kubernetes.io/websocket-services: "stunnel-server"      
      external-dns.alpha.kubernetes.io/hostname: ldap.computersthatwork.ca
      external-dns.alpha.kubernetes.io/target: 192.168.2.211  
    hosts:
      - host: ldap.computersthatwork.ca
        paths:
          - backend:
              service:
                name: ldap
                port:
                  number: 636
            path: /
            pathType: ImplementationSpecific

    tls: 
      - secretName: ldap.computersthatwork.ca
        hosts:
          - ldap.computersthatwork.ca
          
persistence:
  config:
    enabled: true
    mountPath: /opt/ssl/
    readOnly: true
    type: secret
    name: ldap.computersthatwork.ca
    defaultMode: 292


# affinity: {}

podAntiAffinityPreset: soft