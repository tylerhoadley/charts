{{- range $projectName, $projectData := .Values.project }}
{{- if and $projectData.enabled $projectData.config (default false $projectData.config.enabled) }}
{{- if ne $projectData.create false }}
---
{{- $projectRoot := deepCopy $ }}
{{- $_ := set $projectRoot "Values" (merge (dict "nameOverride" $projectData.nameOverride "fullnameOverride" $projectData.fullnameOverride) $.Values) }}
{{- $parentProjectName := include "common.names.fullname" $projectRoot }}
{{- if not (or $projectData.nameOverride $projectData.fullnameOverride) }}
  {{- $parentProjectName = printf "%v-%v" $parentProjectName $projectName }}
{{- end }}
{{- $api_version := include "common.capabilities.kargo.apiVersion" . }}

apiVersion: {{ $api_version }}
kind: ProjectConfig
metadata:
  name: {{ $projectName }}
  {{- with (merge ($projectData.labels | default dict) (include "common.labels" $projectRoot | fromYaml)) }}
  labels: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with (merge ($projectData.annotations | default dict) (include "common.annotations" $projectRoot | fromYaml)) }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if (or $projectData.config.webhookReceivers $projectData.config.promotionPolicies) }}
spec:
  {{- if $projectData.config.promotionPolicies }}
  promotionPolicies:
    {{- toYaml $projectData.config.promotionPolicies | nindent 4 }}
  {{- end }}
  {{- if $projectData.config.webhookReceivers }}
  webhookReceivers:
    {{- toYaml $projectData.config.webhookReceivers | nindent 4 }}
  {{- end }}
  {{- end }}
{{ end }}
{{- end }}
{{ end }}