{{- range $clusterConfigName, $configData := .Values.clusterConfig }}
{{- if $configData.enabled }}
---
{{- $templateRoot := deepCopy $ }}
{{- $api_version := include "common.capabilities.kargo.apiVersion" . }}

apiVersion: {{ $api_version }}
kind: ClusterConfig
metadata:
  name: {{ $clusterConfigName }}
  {{- with (merge ($configData.labels | default dict) (include "common.labels" $templateRoot | fromYaml)) }}
  labels: {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with (merge ($configData.annotations | default dict) (include "common.annotations" $templateRoot | fromYaml)) }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $configData.gitClient }}
  gitClient:
    {{- toYaml $configData.gitClient | nindent 4 }}
  {{- end }}
  {{- if $configData.config.webhookReceivers }}
  webhookReceivers:
    {{- toYaml $configData.config.webhookReceivers | nindent 4 }}
  {{- end }}
{{- end }}
{{ end }}

